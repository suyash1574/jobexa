name: Keep Render Server Alive

on:
  schedule:
    # Run every 12 minutes (Render free tier goes to sleep after 15 minutes)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allow manually running the ping workflow from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://jobexa-backend.onrender.com/
